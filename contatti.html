<body>

    <header class="navbar">
        <input type="checkbox" id="menu-toggle" class="navbar__toggle">

        <label for="menu-toggle" class="navbar__hamburger">
            <img class="navbar__hamburger-icon" src="assets/img/hamburger_icon.svg" alt="Apri menu">
        </label>

        <nav class="navbar__nav" aria-label="Navigazione principale">
            <ul class="navbar__list" id="menu">
                <li class="navbar__item"><a href="index.html" class="navbar__link">Home</a></li>
                <li class="navbar__item"><a href="cv.html" class="navbar__link">Curriculum</a></li>
                <li class="navbar__item"><a href="progetti.html" class="navbar__link">Projects</a></li>
                <li class="navbar__item"><a href="contatti.html" class="navbar__link">Get in touch</a></li>
            </ul>
        </nav>

        <a href="https://www.linkedin.com/in/lara-parisi/" class="navbar__linkedin" target="_blank"
            rel="noopener noreferrer nofollow">
            LinkedIn
        </a>
    </header>

    <main class="container contact-page" aria-labelledby="contact-title">

        <section class="contact-section">

            <h1 id="contact-title">Write to me</h1>

            <p class="contact-section__intro">
                Do you have a project in mind, or do you just want to get in touch? <br>
                Fill out the form below, and I’ll get back to you as soon as possible.
            </p>

            <form class="contact-form" action="#" method="post">

                <!-- Nome e cognome -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="visually-hidden">Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Name" required>
                    </div>

                    <div class="col-md-6">
                        <label for="surname" class="visually-hidden">Surname</label>
                        <input type="text" id="surname" name="surname" class="form-control" placeholder="Surname"
                            required>
                    </div>
                </div>

                <!-- Company e email -->
                <div class="row g-3 mt-1">
                    <div class="col-md-6">
                        <label for="company" class="visually-hidden">Company</label>
                        <input type="text" id="company" name="company" class="form-control" placeholder="Company">
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="visually-hidden">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
                    </div>
                </div>

                <!-- Ruolo -->
                <div class="mt-3">
                    <label for="role" class="visually-hidden">Role</label>
                    <input type="text" id="role" name="role" class="form-control" placeholder="Role">
                </div>

                <!-- Messaggio -->
                <div class="mt-3">
                    <label for="message" class="visually-hidden">Message</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Write your message..."
                        rows="6" required></textarea>
                </div>

                <!-- Bottone -->
                <button type="submit" class="btn btn-dark mt-4">
                    Send message
                </button>

            </form>

        </section>

    </main>

    <footer class="footer">
        <nav class="footer__nav" aria-label="Link social">
            <ul class="footer__list">
                <li><a href="https://www.linkedin.com/in/lara-parisi/" target="_blank"
                        rel="noopener noreferrer nofollow">LinkedIn</a></li>
                <li><a href="https://github.com/laraparisi/laraparisi.github.io" target="_blank"
                        rel="noopener noreferrer nofollow">GitHub</a></li>
            </ul>
        </nav>
    </footer>

</body>

</html>
